  <circle cx="740" cy="300" r="7" fill="#3b82f6" stroke="rgba(255,255,255,0.4)" stroke-width="1.5" opacity="0.85"/>
  <circle cx="880" cy="300" r="7" fill="#3b82f6" stroke="rgba(255,255,255,0.4)" stroke-width="1.5" opacity="0.85"/>
