  <circle cx="866" cy="26" r="4" fill="#10b981"/>
  <text x="875" y="30" font-family="system-ui, sans-serif" font-size="11" fill="#6ee7b7">qwen3.6:35b</text>

  <rect x="980" y="14" width="95" height="24" rx="12" fill="#0c4a6e" stroke="#0284c7" stroke-width="1"/>
  <circle cx="996" cy="26" r="4" fill="#38bdf8"/>
  <text x="1005" y="30" font-family="system-ui, sans-serif" font-size="11" fill="#7dd3fc">Zillow Live</text>

  <rect x="1085" y="14" width="100" height="24" rx="12" fill="#1f2937" stroke="#374151" stroke-width="1"/>
  <text x="1105" y="30" font-family="system-ui, sans-serif" font-size="11" fill="#9ca3af">New Search</text>

