<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>FindRE — AI-powered real estate discovery engine</title>
  <desc>Dark-themed hero image showing the FindRE interface: chat intake on the left, map with scored property markers on the right</desc>

  <!-- Background -->
  <rect width="1200" height="630" fill="#030712"/>

  <!-- Subtle grid lines -->
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#111827" stroke-width="1"/>
    </pattern>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="mapglow" cx="65%" cy="50%" r="40%">
      <stop offset="0%" stop-color="#0ea5e9" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#030712" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <rect width="1200" height="630" fill="url(#mapglow)"/>

  <!-- ── LEFT PANEL: App chrome + chat ── -->
  <rect x="0" y="0" width="370" height="630" fill="#111827"/>
  <rect x="370" y="0" width="1" height="630" fill="#1f2937"/>

  <!-- Header bar -->
  <rect x="0" y="0" width="1200" height="52" fill="#0f172a"/>
  <rect x="0" y="52" width="1200" height="1" fill="#1f2937"/>

  <!-- Logo -->
  <circle cx="28" cy="26" r="10" fill="#0ea5e9" opacity="0.9"/>
